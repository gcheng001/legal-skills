案由: 继承纠纷
案由编号: "25"
请求权基础:
  - 法律依据: "《民法典》第1123条（继承方式）"
    构成要件:
      - 要件名称: 被继承人死亡
        说明: 被继承人已经死亡
        必要事实: ["死亡证明", "户籍注销证明"]
        证据类型: ["书证"]
      - 要件名称: 继承权
        说明: 原告享有合法继承权
        必要事实: ["法定继承人身份", "遗嘱指定", "遗赠扶养协议"]
        证据类型: ["书证", "亲属关系证明"]
      - 要件名称: 遗产范围
        说明: 存在可继承的遗产
        必要事实: ["房产", "存款", "车辆", "股权", "其他财产"]
        证据类型: ["书证", "银行流水", "产权证明"]
  - 法律依据: "《民法典》第1130条（法定继承份额）"
    构成要件:
      - 要件名称: 同一顺序继承人
        说明: 原告与被告属于同一顺序继承人
        必要事实: ["继承人清单", "亲属关系"]
        证据类型: ["书证"]
      - 要件名称: 份额争议
        说明: 继承人之间对份额存在争议
        必要事实: ["应继份额计算", "多分/少分事由"]
        证据类型: ["书证"]
常见抗辩:
  - 抗辩名称: 遗嘱优先
    类型: 权利阻止
    法律依据: "《民法典》第1123条"
    证明事项: ["存在有效遗嘱", "遗嘱排除法定继承"]
    证据类型: ["遗嘱原件", "见证人证言"]
  - 抗辩名称: 丧失继承权
    类型: 权利阻止
    法律依据: "《民法典》第1125条"
    证明事项: ["故意杀害被继承人", "遗弃/虐待被继承人", "伪造遗嘱"]
    证据类型: ["刑事判决", "相关证据"]
  - 抗辩名称: 已放弃继承
    类型: 权利消灭
    法律依据: "《民法典》第1124条"
    证明事项: ["书面放弃声明", "公证放弃"]
    证据类型: ["书证", "公证书"]
  - 抗辩名称: 已超出诉讼时效
    类型: 权利消灭
    法律依据: "《民法典》第188条"
    证明事项: ["继承开始超过20年", "知道权利被侵犯超过3年"]
    证据类型: ["时间计算"]
举证责任:
  - 要件: 继承权
    举证方: 原告
    说明: 主张继承权的一方需证明继承人身份
  - 要件: 遗产范围
    举证方: 双方
    说明: 双方均有义务如实申报遗产
  - 要件: 遗嘱效力
    举证方: 主张方
    说明: 主张遗嘱有效的一方需证明遗嘱真实合法
