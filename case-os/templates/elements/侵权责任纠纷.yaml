案由: 侵权责任纠纷
案由编号: "340"
请求权基础:
  - 法律依据: "《民法典》第1165条（过错侵权）"
    构成要件:
      - 要件名称: 侵权行为
        说明: 行为人实施了侵害他人民事权益的行为
        必要事实: ["行为描述", "作为/不作为"]
        证据类型: ["书证", "视听资料", "证人证言"]
      - 要件名称: 损害结果
        说明: 被侵权人遭受了实际损害
        必要事实: ["人身损害", "财产损失", "精神损害"]
        证据类型: ["书证", "鉴定意见", "票据"]
      - 要件名称: 因果关系
        说明: 侵权行为与损害结果之间存在因果关系
        必要事实: ["行为导致损害的逻辑链", "医学/技术鉴定"]
        证据类型: ["鉴定意见", "专家意见"]
      - 要件名称: 过错
        说明: 行为人存在故意或过失
        必要事实: ["主观故意", "注意义务违反"]
        证据类型: ["书证", "证人证言"]
  - 法律依据: "《民法典》第1166条（无过错侵权）"
    构成要件:
      - 要件名称: 法律规定的无过错情形
        说明: 属于法律规定的无过错责任情形
        必要事实: ["产品责任", "环境污染", "高度危险作业", "饲养动物"]
        证据类型: ["书证"]
常见抗辩:
  - 抗辩名称: 受害人故意
    类型: 权利消灭
    法律依据: "《民法典》第1174条"
    证明事项: ["受害人故意造成损害"]
    证据类型: ["监控视频", "证人证言"]
  - 抗辩名称: 第三人过错
    类型: 权利阻止
    法律依据: "《民法典》第1175条"
    证明事项: ["损害由第三人造成"]
    证据类型: ["第三人行为证据"]
  - 抗辩名称: 不可抗力
    类型: 权利消灭
    法律依据: "《民法典》第180条"
    证明事项: ["自然灾害", "政府行为", "社会异常事件"]
    证据类型: ["气象证明", "政府文件"]
  - 抗辩名称: 正当防卫/紧急避险
    类型: 权利阻止
    法律依据: "《民法典》第181条、第182条"
    证明事项: ["防卫必要性", "避险必要性"]
    证据类型: ["现场证据", "证人证言"]
举证责任:
  - 要件: 侵权行为+过错
    举证方: 原告
    说明: 被侵权人需证明行为人实施侵权行为且存在过错
  - 要件: 损害+因果关系
    举证方: 原告
    说明: 被侵权人需证明损害事实及因果关系
  - 要件: 免责事由
    举证方: 被告
    说明: 行为人主张免责需举证
