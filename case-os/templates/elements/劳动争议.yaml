案由: 劳动争议
案由编号: "170"
请求权基础:
  - 法律依据: "《劳动合同法》第46条（经济补偿）"
    构成要件:
      - 要件名称: 劳动关系存在
        说明: 双方存在合法劳动关系
        必要事实: ["劳动合同", "工资支付记录", "社保缴纳记录", "工作证/工牌"]
        证据类型: ["书证", "电子数据"]
      - 要件名称: 解除/终止事实
        说明: 用人单位解除或终止劳动合同
        必要事实: ["解除通知", "离职证明", "辞退录音"]
        证据类型: ["书证", "电子数据", "视听资料"]
      - 要件名称: 解除违法性
        说明: 解除缺乏法定事由或程序违法
        必要事实: ["无规章制度依据", "未通知工会", "未提前30天通知"]
        证据类型: ["书证"]
  - 法律依据: "《劳动合同法》第82条（未签书面合同二倍工资）"
    构成要件:
      - 要件名称: 未签书面合同
        说明: 用工之日起超1个月未签书面劳动合同
        必要事实: ["入职日期", "无书面合同或合同缺失"]
        证据类型: ["书证", "入职登记表"]
      - 要件名称: 用工超过1个月
        说明: 自用工之日起超过1个月不满1年
        必要事实: ["入职时间证明", "工资发放记录"]
        证据类型: ["书证"]
常见抗辩:
  - 抗辩名称: 严重违纪解除
    类型: 权利阻止
    法律依据: "《劳动合同法》第39条"
    证明事项: ["规章制度合法有效", "违纪事实清楚", "制度已告知劳动者"]
    证据类型: ["规章制度", "违纪证据", "告知签收"]
  - 抗辩名称: 劳动者主动辞职
    类型: 权利阻止
    法律依据: "《劳动合同法》第37条"
    证明事项: ["辞职申请/辞职信", "劳动者自愿离职"]
    证据类型: ["书证", "聊天记录"]
  - 抗辩名称: 试用期不符合录用条件
    类型: 权利阻止
    法律依据: "《劳动合同法》第39条第1项"
    证明事项: ["明确的录用条件", "考核不达标证据"]
    证据类型: ["录用条件告知书", "考核记录"]
  - 抗辩名称: 仲裁时效届满
    类型: 权利消灭
    法律依据: "《劳动争议调解仲裁法》第27条"
    证明事项: ["超过1年仲裁时效"]
    证据类型: ["时间计算"]
举证责任:
  - 要件: 劳动关系存在
    举证方: 原告
    说明: 劳动者需证明劳动关系存在
  - 要件: 解除违法性
    举证方: 被告
    说明: 用人单位需证明解除合法（举证责任倒置）
  - 要件: 工资标准
    举证方: 被告
    说明: 用人单位需提供工资支付记录（2年内）
  - 要件: 规章制度合法性
    举证方: 被告
    说明: 用人单位需证明制度经民主程序制定并告知
