案由: 竞业限制纠纷
案由编号: "172"
请求权基础:
  - 法律依据: "《劳动合同法》第23条、第24条（竞业限制义务）"
    构成要件:
      - 要件名称: 竞业限制协议有效
        说明: 双方签订合法有效的竞业限制协议
        必要事实: ["竞业限制条款/协议", "签订时间", "补偿金约定"]
        证据类型: ["书证"]
      - 要件名称: 竞业限制主体适格
        说明: 劳动者属于高管/高级技术人员/其他保密人员
        必要事实: ["岗位职责说明", "掌握商业秘密的证据"]
        证据类型: ["书证", "劳动合同"]
      - 要件名称: 违反竞业行为
        说明: 劳动者入职竞争企业或自营竞争业务
        必要事实: ["新单位工商信息", "社保缴纳记录", "在竞争企业任职证据"]
        证据类型: ["书证", "电子数据", "工商查询"]
      - 要件名称: 竞业限制期限内
        说明: 违约行为发生在约定的竞业限制期内（最长2年）
        必要事实: ["离职日期", "竞业期限约定", "违约时间"]
        证据类型: ["书证"]
  - 法律依据: "《劳动合同法》第23条（竞业限制补偿金）"
    构成要件:
      - 要件名称: 约定竞业限制
        说明: 合同中约定了竞业限制条款
        必要事实: ["竞业限制条款"]
        证据类型: ["书证"]
      - 要件名称: 用人单位未支付补偿金
        说明: 解除合同后超过3个月未支付补偿金
        必要事实: ["离职日期", "未收到补偿金的证明"]
        证据类型: ["银行流水", "书面催告"]
常见抗辩:
  - 抗辩名称: 竞业限制协议无效
    类型: 权利阻止
    法律依据: "《劳动合同法》第26条"
    证明事项: ["非适格主体", "未约定补偿金", "限制范围过宽"]
    证据类型: ["岗位说明", "协议文本"]
  - 抗辩名称: 未实际违反竞业
    类型: 权利阻止
    法律依据: "举证责任"
    证明事项: ["新单位非竞争企业", "岗位不涉及竞争业务"]
    证据类型: ["工商信息", "岗位描述"]
  - 抗辩名称: 用人单位未支付补偿金
    类型: 权利消灭
    法律依据: "《竞业限制司法解释》第8条"
    证明事项: ["超过3个月未支付", "已书面通知解除"]
    证据类型: ["银行流水", "解除通知"]
  - 抗辩名称: 违约金过高
    类型: 权利妨碍
    法律依据: "《民法典》第585条"
    证明事项: ["违约金明显高于实际损失"]
    证据类型: ["损失计算"]
举证责任:
  - 要件: 竞业限制协议
    举证方: 原告
    说明: 用人单位需证明存在有效竞业限制协议
  - 要件: 违反竞业行为
    举证方: 原告
    说明: 用人单位需证明劳动者违反竞业限制
  - 要件: 补偿金支付
    举证方: 被告
    说明: 劳动者主张未支付补偿金的，单位需证明已支付
