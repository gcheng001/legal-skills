案由: 服务合同纠纷
案由编号: "104"
请求权基础:
  - 法律依据: "《民法典》第577条（违约责任）、合同编服务合同章"
    构成要件:
      - 要件名称: 服务合同成立
        说明: 双方签订服务合同或达成服务合意
        必要事实: ["书面服务合同", "订单/确认函", "口头约定证据"]
        证据类型: ["书证", "电子数据"]
      - 要件名称: 已提供服务
        说明: 服务提供方已按约定提供服务
        必要事实: ["服务记录", "验收确认", "交付成果"]
        证据类型: ["书证", "电子数据"]
      - 要件名称: 服务费未付
        说明: 委托方未按约定支付服务费
        必要事实: ["应付金额", "已付金额", "欠付差额"]
        证据类型: ["书证", "银行流水"]
  - 法律依据: "《民法典》第577条（服务质量违约）"
    构成要件:
      - 要件名称: 服务不符合约定
        说明: 服务质量未达约定标准
        必要事实: ["服务标准约定", "实际服务质量", "差距说明"]
        证据类型: ["书证", "鉴定意见"]
常见抗辩:
  - 抗辩名称: 服务未完成/质量不合格
    类型: 权利阻止
    法律依据: "《民法典》第577条"
    证明事项: ["服务未达标", "未完成约定内容"]
    证据类型: ["服务记录对比", "专家意见"]
  - 抗辩名称: 已付款
    类型: 权利消灭
    法律依据: "《民法典》第557条"
    证明事项: ["已全额支付服务费"]
    证据类型: ["转账记录", "发票"]
  - 抗辩名称: 对方先违约
    类型: 权利阻止
    法律依据: "《民法典》第525条"
    证明事项: ["服务方未按时提供", "服务方违反保密义务"]
    证据类型: ["时间记录", "合同约定"]
举证责任:
  - 要件: 合同成立
    举证方: 原告
    说明: 服务提供方需证明合同成立
  - 要件: 已提供服务
    举证方: 原告
    说明: 服务提供方需证明已按约提供服务
  - 要件: 服务质量不合格
    举证方: 被告
    说明: 委托方主张服务质量不合格需举证
