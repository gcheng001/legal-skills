案由: 房屋租赁合同纠纷
案由编号: "87"
请求权基础:
  - 法律依据: "《民法典》第721条（租金支付义务）"
    构成要件:
      - 要件名称: 租赁合同成立
        说明: 双方签订房屋租赁合同
        必要事实: ["书面租赁合同", "口头约定证据"]
        证据类型: ["书证"]
      - 要件名称: 已交付房屋
        说明: 出租人已将房屋交付承租人使用
        必要事实: ["房屋交接单", "水电燃气开通记录", "入住照片"]
        证据类型: ["书证", "视听资料"]
      - 要件名称: 租金未付
        说明: 承租人未按约定支付租金
        必要事实: ["应付租金金额", "已付金额", "欠付期间"]
        证据类型: ["书证", "银行流水"]
  - 法律依据: "《民法典》第733条（租赁物返还）"
    构成要件:
      - 要件名称: 租赁期限届满
        说明: 合同到期或已解除
        必要事实: ["合同到期日", "解除通知"]
        证据类型: ["书证"]
      - 要件名称: 未返还房屋
        说明: 承租人拒不腾退
        必要事实: ["仍在占用房屋的证据", "催告腾退通知"]
        证据类型: ["照片", "书证"]
常见抗辩:
  - 抗辩名称: 房屋存在重大瑕疵
    类型: 权利阻止
    法律依据: "《民法典》第731条"
    证明事项: ["房屋不适合居住", "出租人未维修"]
    证据类型: ["照片", "维修通知"]
  - 抗辩名称: 已付租金
    类型: 权利消灭
    法律依据: "《民法典》第557条"
    证明事项: ["已全额支付租金"]
    证据类型: ["转账记录", "收据"]
  - 抗辩名称: 出租人违约在先
    类型: 权利阻止
    法律依据: "《民法典》第525条"
    证明事项: ["未提供约定房屋", "擅自涨租", "干扰正常使用"]
    证据类型: ["合同对比", "聊天记录"]
  - 抗辩名称: 押金抵扣抗辩
    类型: 权利消灭
    法律依据: "《民法典》第714条"
    证明事项: ["已支付押金", "应抵扣租金或损失"]
    证据类型: ["押金收据"]
举证责任:
  - 要件: 合同成立
    举证方: 原告
    说明: 出租人需证明租赁合同成立
  - 要件: 已交房
    举证方: 原告
    说明: 出租人需证明已交付房屋
  - 要件: 已付租金
    举证方: 被告
    说明: 承租人主张已付租金需举证
