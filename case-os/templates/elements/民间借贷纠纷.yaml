案由: 民间借贷纠纷
案由编号: "109"
请求权基础:
  - 法律依据: "《民法典》第667条（借款合同定义）"
    构成要件:
      - 要件名称: 借贷合意
        说明: 双方达成借款的意思表示
        必要事实: ["借款合同/借条/欠条", "微信聊天记录中的借款确认", "口头约定的证人证言"]
        证据类型: ["书证", "电子数据", "证人证言"]
      - 要件名称: 款项交付
        说明: 出借人实际交付借款
        必要事实: ["银行转账记录", "微信/支付宝转账记录", "现金收条"]
        证据类型: ["书证", "电子数据"]
      - 要件名称: 借款金额与期限
        说明: 明确借款本金、利息、还款期限
        必要事实: ["合同约定金额", "利息计算方式", "还款日期"]
        证据类型: ["书证"]
      - 要件名称: 还款期限届满或催告
        说明: 还款到期或出借人催告后合理期限届满
        必要事实: ["到期日证明", "催款通知/律师函"]
        证据类型: ["书证", "电子数据"]
常见抗辩:
  - 抗辩名称: 借贷关系不成立
    类型: 权利阻止
    法律依据: "《民法典》第668条"
    证明事项: ["未实际收到款项", "系赠与而非借贷", "系投资款而非借款"]
    证据类型: ["转账记录缺失", "赠与意思表示"]
  - 抗辩名称: 已清偿
    类型: 权利消灭
    法律依据: "《民法典》第557条"
    证明事项: ["已全额还款", "还款凭证"]
    证据类型: ["转账记录", "收条"]
  - 抗辩名称: 诉讼时效届满
    类型: 权利消灭
    法律依据: "《民法典》第188条"
    证明事项: ["超过3年诉讼时效", "无中断事由"]
    证据类型: ["时间计算", "催款记录"]
  - 抗辩名称: 利息超过法定上限
    类型: 权利妨碍
    法律依据: "《民间借贷司法解释》第25条"
    证明事项: ["利率超过LPR四倍"]
    证据类型: ["利息计算表"]
  - 抗辩名称: 夫妻共同债务否认
    类型: 权利阻止
    法律依据: "《民法典》第1064条"
    证明事项: ["未用于家庭生活", "非共同意思表示"]
    证据类型: ["家庭收支记录", "分居证明"]
举证责任:
  - 要件: 借贷合意
    举证方: 原告
    说明: 出借人需证明双方存在借贷合意
  - 要件: 款项交付
    举证方: 原告
    说明: 出借人需证明已实际交付借款
  - 要件: 已清偿
    举证方: 被告
    说明: 借款人主张已还款的，需自行举证
  - 要件: 诉讼时效
    举证方: 被告
    说明: 被告主张时效抗辩的，需证明时效届满
