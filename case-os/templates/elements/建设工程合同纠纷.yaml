案由: 建设工程合同纠纷
案由编号: "115"
请求权基础:
  - 法律依据: "《民法典》第793条（工程价款）"
    构成要件:
      - 要件名称: 建设工程合同有效
        说明: 发包方与承包方签订合法有效的施工合同
        必要事实: ["书面施工合同", "中标通知书", "施工许可证"]
        证据类型: ["书证"]
      - 要件名称: 工程已完工/验收
        说明: 承包方完成施工并通过验收
        必要事实: ["竣工验收报告", "分部分项验收记录", "实际使用证明"]
        证据类型: ["书证", "视听资料"]
      - 要件名称: 工程价款确定
        说明: 工程造价已结算或可鉴定
        必要事实: ["结算协议", "审计报告", "工程造价鉴定"]
        证据类型: ["书证", "鉴定意见"]
      - 要件名称: 欠付工程款
        说明: 发包方未按约定支付工程款
        必要事实: ["已付金额", "应付款金额", "欠付差额"]
        证据类型: ["书证", "银行流水"]
  - 法律依据: "《民法典》第807条（建设工程价款优先受偿权）"
    构成要件:
      - 要件名称: 工程价款债权
        说明: 承包人享有合法的工程价款债权
        必要事实: ["欠付工程款事实"]
        证据类型: ["书证"]
      - 要件名称: 优先受偿权行使期限
        说明: 在合理期限内行使（最长18个月）
        必要事实: ["竣工/约定竣工日期", "行使权利的时间"]
        证据类型: ["书证"]
常见抗辩:
  - 抗辩名称: 工程质量不合格
    类型: 权利阻止
    法律依据: "《民法典》第799条"
    证明事项: ["质量缺陷鉴定", "修复费用"]
    证据类型: ["鉴定意见", "检测报告"]
  - 抗辩名称: 未经验收擅自使用
    类型: 权利妨碍
    法律依据: "《建设工程司法解释》第14条"
    证明事项: ["发包方擅自使用", "使用证据"]
    证据类型: ["照片", "入住/经营记录"]
  - 抗辩名称: 挂靠/违法分包
    类型: 权利阻止
    法律依据: "《建设工程司法解释》第1条"
    证明事项: ["无资质借用资质", "违法转包分包"]
    证据类型: ["工商信息", "实际施工证据"]
  - 抗辩名称: 工程未竣工
    类型: 权利阻止
    法律依据: "《民法典》第793条"
    证明事项: ["工程未完工", "中途退场"]
    证据类型: ["施工日志", "监理记录"]
举证责任:
  - 要件: 合同有效
    举证方: 原告
    说明: 承包人需证明合同成立并有效
  - 要件: 工程完工
    举证方: 原告
    说明: 承包人需证明已完工或完成约定工程量
  - 要件: 工程质量
    举证方: 被告
    说明: 发包人主张质量不合格的需举证
  - 要件: 已付款
    举证方: 被告
    说明: 发包人需证明已支付的工程款金额
