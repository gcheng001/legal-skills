案由: 买卖合同纠纷
案由编号: "81"
请求权基础:
  - 法律依据: "《民法典》第577条（违约责任）、第626条（买卖合同）"
    构成要件:
      - 要件名称: 买卖合同成立
        说明: 双方达成买卖合意
        必要事实: ["书面合同", "订单/报价单", "微信/邮件确认"]
        证据类型: ["书证", "电子数据"]
      - 要件名称: 已交付货物
        说明: 出卖人已按约定交付标的物
        必要事实: ["送货单", "签收单", "物流记录"]
        证据类型: ["书证", "电子数据"]
      - 要件名称: 货款未付
        说明: 买受人未按约定支付货款
        必要事实: ["应付金额", "已付金额", "欠付差额", "对账单"]
        证据类型: ["书证", "银行流水"]
      - 要件名称: 催告/到期
        说明: 付款期限届满或经催告
        必要事实: ["付款期限约定", "催款函/律师函"]
        证据类型: ["书证"]
  - 法律依据: "《民法典》第617条（标的物瑕疵担保）"
    构成要件:
      - 要件名称: 标的物质量不合格
        说明: 交付的货物不符合约定或法定标准
        必要事实: ["质量标准约定", "检验报告", "不合格通知"]
        证据类型: ["书证", "鉴定意见"]
常见抗辩:
  - 抗辩名称: 货物质量不合格
    类型: 权利阻止
    法律依据: "《民法典》第617条"
    证明事项: ["质量不符合约定", "及时提出异议"]
    证据类型: ["检验报告", "异议通知"]
  - 抗辩名称: 已付款
    类型: 权利消灭
    法律依据: "《民法典》第557条"
    证明事项: ["已全额支付货款"]
    证据类型: ["转账记录", "收据"]
  - 抗辩名称: 未收到货物
    类型: 权利阻止
    法律依据: "《民法典》第604条"
    证明事项: ["未实际收到标的物", "签收非本人"]
    证据类型: ["物流记录", "签收异议"]
  - 抗辩名称: 同时履行抗辩
    类型: 权利阻止
    法律依据: "《民法典》第525条"
    证明事项: ["对方未先履行义务"]
    证据类型: ["合同约定", "履约记录"]
举证责任:
  - 要件: 合同成立
    举证方: 原告
    说明: 出卖人需证明买卖合同成立
  - 要件: 已交货
    举证方: 原告
    说明: 出卖人需证明已交付货物
  - 要件: 质量不合格
    举证方: 被告
    说明: 买受人主张质量不合格需举证
  - 要件: 已付款
    举证方: 被告
    说明: 买受人主张已付款需举证
