案由: 股权转让纠纷
案由编号: "247"
请求权基础:
  - 法律依据: "《公司法》第71条（股权转让）"
    构成要件:
      - 要件名称: 股权转让协议有效
        说明: 双方签订合法有效的股权转让协议
        必要事实: ["股权转让协议", "股东会决议", "其他股东放弃优先购买权"]
        证据类型: ["书证"]
      - 要件名称: 股权变更登记
        说明: 已完成工商变更登记或应办理
        必要事实: ["工商变更登记", "股东名册变更"]
        证据类型: ["书证", "工商信息"]
      - 要件名称: 转让款未付
        说明: 受让方未按约定支付股权转让款
        必要事实: ["应付转让款", "已付金额", "欠付差额"]
        证据类型: ["书证", "银行流水"]
  - 法律依据: "《公司法》第74条（异议股东回购请求权）"
    构成要件:
      - 要件名称: 法定回购情形
        说明: 公司出现法定应回购股权的情形
        必要事实: ["连续5年盈利不分红", "合并/分立/转让主要财产", "章程届满续期"]
        证据类型: ["书证", "股东会决议"]
常见抗辩:
  - 抗辩名称: 未经其他股东同意
    类型: 权利阻止
    法律依据: "《公司法》第71条"
    证明事项: ["未通知其他股东", "其他股东主张优先购买权"]
    证据类型: ["通知记录", "股东会决议"]
  - 抗辩名称: 股权转让协议无效
    类型: 权利阻止
    法律依据: "《民法典》第144、146、153、154条"
    证明事项: ["欺诈/胁迫", "恶意串通", "违反强制性规定"]
    证据类型: ["相关证据"]
  - 抗辩名称: 股权存在瑕疵
    类型: 权利阻止
    法律依据: "《民法典》第612条"
    证明事项: ["股权被质押/冻结", "出资未实缴", "代持关系"]
    证据类型: ["质押登记", "冻结裁定", "代持协议"]
  - 抗辩名称: 已支付转让款
    类型: 权利消灭
    法律依据: "《民法典》第557条"
    证明事项: ["已全额支付"]
    证据类型: ["转账记录", "收据"]
举证责任:
  - 要件: 协议有效
    举证方: 原告
    说明: 转让方需证明协议合法有效
  - 要件: 已付款
    举证方: 被告
    说明: 受让方主张已付款需举证
  - 要件: 优先购买权
    举证方: 被告
    说明: 主张优先购买权的股东需举证
