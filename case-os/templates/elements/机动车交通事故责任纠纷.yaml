案由: 机动车交通事故责任纠纷
案由编号: "317"
请求权基础:
  - 法律依据: "《民法典》第1208条、《道路交通安全法》第76条"
    构成要件:
      - 要件名称: 交通事故发生
        说明: 机动车发生交通事故
        必要事实: ["交通事故认定书", "事故现场照片", "报警记录"]
        证据类型: ["书证", "视听资料"]
      - 要件名称: 责任划分
        说明: 交警部门认定事故责任
        必要事实: ["事故认定书", "责任比例"]
        证据类型: ["书证"]
      - 要件名称: 损害事实
        说明: 造成人身或财产损害
        必要事实: ["医疗费票据", "伤残鉴定", "财产损失评估"]
        证据类型: ["书证", "鉴定意见"]
      - 要件名称: 因果关系
        说明: 损害与事故之间存在因果关系
        必要事实: ["病历记录", "治疗与事故关联性"]
        证据类型: ["书证", "鉴定意见"]
  - 法律依据: "《民法典》第1179条（人身损害赔偿）"
    构成要件:
      - 要件名称: 人身伤害
        说明: 因事故造成人身伤害
        必要事实: ["医疗费", "误工费", "护理费", "残疾赔偿金"]
        证据类型: ["书证", "鉴定意见"]
常见抗辩:
  - 抗辩名称: 受害人过错
    类型: 权利妨碍
    法律依据: "《民法典》第1173条"
    证明事项: ["受害人违反交规", "受害人存在过错"]
    证据类型: ["事故认定书", "监控视频"]
  - 抗辩名称: 赔偿金额过高
    类型: 权利妨碍
    法律依据: "《民法典》第1179条"
    证明事项: ["医疗费不合理", "误工期过长", "伤残等级过高"]
    证据类型: ["医疗费审核", "重新鉴定"]
  - 抗辩名称: 保险公司已赔付
    类型: 权利消灭
    法律依据: "《保险法》第65条"
    证明事项: ["交强险已赔付", "商业险已赔付"]
    证据类型: ["赔付凭证"]
  - 抗辩名称: 非事故导致的伤病
    类型: 权利阻止
    法律依据: "举证责任"
    证明事项: ["既有伤病", "治疗与事故无关"]
    证据类型: ["病历对比", "鉴定意见"]
举证责任:
  - 要件: 事故事实
    举证方: 原告
    说明: 受害人需证明事故发生及责任划分
  - 要件: 损害金额
    举证方: 原告
    说明: 受害人需证明各项损失金额
  - 要件: 受害人过错
    举证方: 被告
    说明: 侵权人主张受害人有过错需举证
