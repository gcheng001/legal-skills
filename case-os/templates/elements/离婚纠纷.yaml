案由: 离婚纠纷
案由编号: "16"
请求权基础:
  - 法律依据: "《民法典》第1079条（离婚条件）"
    构成要件:
      - 要件名称: 婚姻关系存在
        说明: 双方存在合法婚姻关系
        必要事实: ["结婚证", "婚姻登记信息"]
        证据类型: ["书证"]
      - 要件名称: 感情确已破裂
        说明: 夫妻感情确已破裂，调解无效
        必要事实: ["分居满2年", "家暴证据", "出轨证据", "赌博吸毒证据"]
        证据类型: ["书证", "视听资料", "证人证言"]
  - 法律依据: "《民法典》第1087条（财产分割）"
    构成要件:
      - 要件名称: 夫妻共同财产
        说明: 存在需要分割的夫妻共同财产
        必要事实: ["房产信息", "存款信息", "车辆信息", "股权信息"]
        证据类型: ["书证", "银行流水", "工商信息"]
  - 法律依据: "《民法典》第1085条（子女抚养）"
    构成要件:
      - 要件名称: 未成年子女
        说明: 双方有未成年子女需要确定抚养权
        必要事实: ["子女出生证明", "子女年龄"]
        证据类型: ["书证"]
      - 要件名称: 抚养能力
        说明: 一方具有更好的抚养条件
        必要事实: ["经济条件", "居住条件", "子女意愿（8周岁以上）"]
        证据类型: ["书证", "收入证明"]
常见抗辩:
  - 抗辩名称: 感情未破裂
    类型: 权利阻止
    法律依据: "《民法典》第1079条"
    证明事项: ["感情尚可", "和好可能", "未分居"]
    证据类型: ["共同生活证据", "和好沟通记录"]
  - 抗辩名称: 女方怀孕/分娩1年内
    类型: 权利阻止
    法律依据: "《民法典》第1082条"
    证明事项: ["女方怀孕或分娩未满1年"]
    证据类型: ["医院证明"]
  - 抗辩名称: 财产为个人财产
    类型: 权利阻止
    法律依据: "《民法典》第1063条"
    证明事项: ["婚前财产", "个人专用物品", "遗嘱/赠与明确归一方"]
    证据类型: ["产权证明", "遗嘱", "赠与合同"]
举证责任:
  - 要件: 感情破裂
    举证方: 原告
    说明: 提起离婚方需证明感情确已破裂
  - 要件: 共同财产
    举证方: 双方
    说明: 双方均有义务如实申报共同财产
  - 要件: 个人财产
    举证方: 主张方
    说明: 主张为个人财产的一方需举证
