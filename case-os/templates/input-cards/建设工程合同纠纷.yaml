# 建设工程合同纠纷 - 案型专属输入卡
# 加载时机：A4 识别出案由为"建设工程合同纠纷"后自动加载

案由: 建设工程合同纠纷
版本: v1.0

# ===== 必填字段 =====
必填:
  - 字段: 合同效力
    说明: 建设工程合同是否有效
    关键词:
      - 招标投标
      - 中标通知书
      - 备案合同
      - 实际履行合同
    提示: 存在黑白合同时，以备案的中标合同为准
    来源: 原告材料

  - 字段: 工程范围与结算
    说明: 工程范围、结算金额
    关键词:
      - 工程量清单
      - 竣工验收报告
      - 结算审核报告
      - 签证单
      - 工程变更单
    来源: 原告材料

  - 字段: 竣工验收
    说明: 工程是否已竣工验收
    关键词:
      - 竣工验收报告
      - 验收备案表
      - 质量合格证明
    提示: 未经验收擅自使用，以转移占有日为竣工日
    来源: 法院文书/原告材料

  - 字段: 优先受偿权
    说明: 承包人是否享有建设工程价款优先受偿权
    提示: 行使期限为18个月（自应当给付建设工程价款之日起算）
    来源: 需律师判断

# ===== 选填字段 =====
选填:
  - 字段: 挂靠关系
    说明: 是否存在挂靠施工
    提示: 挂靠合同无效，但实际施工人可主张工程款
    来源: 需律师调查

  - 字段: 转包/违法分包
    说明: 是否存在转包或违法分包
    提示: 转包合同无效，但工程质量合格可主张工程款
    来源: 需律师调查

  - 字段: 签证与变更
    说明: 工程量变更的签证确认
    关键词:
      - 签证单
      - 工程变更令
      - 会议纪要
      - 监理确认
    来源: 原告材料

  - 字段: 质量保证金
    说明: 质保金比例、返还条件和期限
    来源: 合同

  - 字段: 进场/退场时间
    说明: 实际施工的时间段
    来源: 施工日志/监理记录

# ===== 风险提示 =====
风险点:
  - 黑白合同 → 以备案合同为准
  - 挂靠/转包 → 合同无效但可主张工程款
  - 优先受偿权18个月期限 → 过期丧失
  - 未竣工验收但已使用 → 以转移占有日为竣工日
  - 结算金额争议 → 需申请工程造价鉴定
