# 买卖合同纠纷 - 案型专属输入卡
# 加载时机：A4 识别出案由为"买卖合同纠纷"后自动加载

案由: 买卖合同纠纷
版本: v1.0

# ===== 必填字段 =====
必填:
  - 字段: 合同成立
    说明: 买卖合同成立的证据
    关键词:
      - 书面合同
      - 订单/订购单
      - 对账单
      - 微信/邮件下单记录
      - 送货单（买方签收）
    来源: 原告材料

  - 字段: 交货闭环
    说明: 货物已交付的完整证据链
    关键词:
      - 送货单
      - 签收单
      - 物流单据
      - 验收记录
      - 入库单
    提示: 送货单必须有买方授权人员签收，否则交货不成立
    来源: 原告材料

  - 字段: 签收人身份
    说明: 签收人是否有权代表买方
    关键词:
      - 法定代表人
      - 授权委托书
      - 项目经理
      - 收货人（合同约定）
      - 仓库管理员
    提示: 签收人非买方人员或无授权 → 交货可能不被认可
    来源: 合同/授权文件

  - 字段: 金额确认
    说明: 欠款金额的确认依据
    关键词:
      - 对账单
      - 结算单
      - 发票
      - 往来函件（确认金额）
    来源: 原告材料

# ===== 选填字段 =====
选填:
  - 字段: 质量异议
    说明: 买方是否提出过质量异议
    提示: 买方在合理期间内未提出质量异议，视为质量合格
    关键词:
      - 质量异议函
      - 退货记录
      - 维修记录
      - 微信沟通（质量投诉）
    来源: 被告材料

  - 字段: 付款条件
    说明: 约定的付款条件和期限
    关键词:
      - 货到付款
      - 月结30天
      - 验收合格后付款
      - 分期付款
    来源: 合同

  - 字段: 违约责任
    说明: 违约金、利息、损失赔偿的约定
    关键词:
      - 逾期付款违约金
      - 日万分之五
      - 滞纳金
      - 损失赔偿
    来源: 合同

  - 字段: 发票情况
    说明: 是否已开具发票
    提示: 未开发票不构成拒付货款的理由（通说），但合同另有约定除外
    来源: 开票记录

  - 字段: 退换货记录
    说明: 是否有退换货情况
    来源: 物流记录/沟通记录

# ===== 风险提示 =====
风险点:
  - 签收人无授权 → 交货不成立
  - 超过质量异议期 → 视为合格（对原告有利）
  - 无对账单/结算单 → 金额难以确定
  - 发票已开但无付款 → 可能被认定为已付款
  - 诉讼时效从约定付款日起算
