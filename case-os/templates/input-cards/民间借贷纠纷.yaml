# 民间借贷纠纷 - 案型专属输入卡
# 加载时机：A4 识别出案由为"民间借贷纠纷"后自动加载

案由: 民间借贷纠纷
版本: v1.0

# ===== 必填字段 =====
必填:
  - 字段: 资金性质
    说明: 借贷资金来源（自有资金/银行贷款/集资转贷）
    提示: 若资金来源为银行贷款转贷，合同可能无效
    来源: 合同/转账记录

  - 字段: 借贷合意
    说明: 双方达成借贷合意的证据
    关键词:
      - 借条
      - 欠条
      - 借款合同
      - 借款协议
      - 还款承诺
      - 微信聊天记录（含借款确认）
    来源: 原告材料

  - 字段: 款项交付
    说明: 借款实际交付的证据
    关键词:
      - 银行转账
      - 微信转账
      - 支付宝转账
      - 现金收条
      - 收款确认
    来源: 原告材料

  - 字段: 逐笔台账
    说明: 多笔借款的逐笔记录
    格式: |
      | 序号 | 借款日期 | 金额 | 利率 | 期限 | 已还金额 | 剩余本金 |
    来源: 需律师整理

# ===== 选填字段 =====
选填:
  - 字段: 利率约定
    说明: 约定利率及是否超过法定上限
    提示: LPR四倍为司法保护上限（2026年约13.8%）
    来源: 合同/借条

  - 字段: 担保情况
    说明: 是否有保证人/抵押/质押
    关键词:
      - 连带责任保证
      - 一般保证
      - 抵押登记
      - 质押合同
    来源: 担保合同

  - 字段: 还款情况
    说明: 已还款金额、时间、方式
    来源: 银行流水/转账记录

  - 字段: 催收记录
    说明: 催收方式和时间（影响诉讼时效）
    关键词:
      - 催款函
      - 微信催收
      - 短信催收
      - 律师函
    来源: 原告材料

  - 字段: 职业放贷审查
    说明: 出借人是否可能被认定为职业放贷人
    提示: 同一原告在法院有大量借贷案件，合同可能无效
    来源: 需法院系统查询

# ===== 风险提示 =====
风险点:
  - 资金来源为银行贷款转贷 → 合同无效
  - 超过LPR四倍的利息 → 不受保护
  - 无实际交付凭证 → 可能败诉
  - 职业放贷人 → 合同无效
  - 诉讼时效经过 → 丧失胜诉权
