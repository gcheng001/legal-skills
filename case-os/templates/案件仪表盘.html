// ========== 截止日期弹窗 ==========
var DEADLINE_DIALOG_HTML = '<div id="deadlineOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);" onclick="if(event.target===this)closeDeadlineDialog()">' +
  '<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);">' +
    '<div style="font-family:\'Noto Serif SC\',serif;font-size:18px;font-weight:700;margin-bottom:20px;">⏰ 设置关键节点截止日期</div>' +
    '<div style="margin-bottom:14px;"><label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">截止日期</label>' +
      '<input type="date" id="dlDate" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;"></div>' +
    '<div style="margin-bottom:14px;"><label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">节点名称（如：立案、开庭、证据交换）</label>' +
      '<input type="text" id="dlTask" placeholder="例如：提交立案材料" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;"></div>' +
    '<div style="margin-bottom:18px;"><label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">备注（可选）</label>' +
      '<textarea id="dlNote" rows="2" placeholder="补充说明..." style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;resize:vertical;"></textarea></div>' +
    '<div style="display:flex;gap:10px;justify-content:flex-end;align-items:center;">' +
      '<span id="dlSyncStatus" style="font-size:10px;color:var(--text-dim);flex:1;"></span>' +
      '<button onclick="closeDeadlineDialog()" style="padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-dim);cursor:pointer;font-family:inherit;font-size:12px;">取消</button>' +
      '<button onclick="saveDeadline()" style="padding:8px 18px;border:none;border-radius:8px;background:var(--amber);color:#000;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;">确认保存</button>' +
      '<button onclick="saveDeadlineAndSync()" id="dlSyncBtn" style="padding:8px 18px;border:1px solid var(--cyan);border-radius:8px;background:var(--cyan-dim);color:var(--cyan);cursor:pointer;font-family:inherit;font-size:12px;" title="保存并同步到飞书任务中枢">保存并同步→飞书</button>' +
    '</div></div></div>';

function ensureDeadlineDialog() {
  if (!document.getElementById('deadlineOverlay')) {
    var div = document.createElement('div');
    div.innerHTML = DEADLINE_DIALOG_HTML;
    document.body.appendChild(div.firstElementChild);
  }
}

function openDeadlineDialog() {
  ensureDeadlineDialog();
  var saved = loadDeadlineData();
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('dlDate').value = saved.date || '';
  document.getElementById('dlDate').setAttribute('min', today);
  document.getElementById('dlTask').value = saved.task || '';
  document.getElementById('dlNote').value = saved.note || '';
  document.getElementById('dlSyncStatus').textContent = '';
  document.getElementById('deadlineOverlay').style.display = 'flex';
}

function closeDeadlineDialog() {
  var ov = document.getElementById('deadlineOverlay');
  if (ov) ov.style.display = 'none';
}

function _deadlineKey() {
  var caseName = (window._D && window._D.meta && window._D.meta.caseName) || 'default';
  return 'caseos_deadline_' + caseName.replace(/\s+/g, '_');
}
function loadDeadlineData() {
  try {
    return JSON.parse(localStorage.getItem(_deadlineKey()) || '{}');
  } catch(e) { return {}; }
}

function saveDeadlineData(data) {
  localStorage.setItem(_deadlineKey(), JSON.stringify(data));
}

function saveDeadline() {
  var date = document.getElementById('dlDate').value;
  var task = document.getElementById('dlTask').value.trim();
  var note = document.getElementById('dlNote').value.trim();
  if (!date) { alert('请选择截止日期'); return; }
  var data = { date: date, task: task, note: note, updatedAt: new Date().toISOString() };
  saveDeadlineData(data);
  updateDeadlineDisplay();
  document.getElementById('dlSyncStatus').textContent = '已保存 ✓';
  setTimeout(function(){ document.getElementById('dlSyncStatus').textContent = ''; }, 2000);
  closeDeadlineDialog();
}

function saveDeadlineAndSync() {
  saveDeadline();
  syncDeadlineToFeishu();
}

function updateDeadlineDisplay() {
  var data = loadDeadlineData();
  var deadlineEl = document.getElementById('kpiDeadlineVal');
  var deadlineBtn = document.getElementById('kpiDeadlineBtn');
  if (!deadlineEl) return;
  if (data.date) {
    var dlDate = new Date(data.date);
    var now = new Date(); now.setHours(0,0,0,0);
    var days = Math.max(0, Math.round((dlDate - now) / 86400000));
    deadlineEl.textContent = days;
    var cls = days <= 3 ? 'orange' : days <= 7 ? 'amber' : 'cyan';
    if (deadlineBtn) { deadlineBtn.className = 'topbar-kpi-btn ' + cls; deadlineBtn.title = data.task || data.date; }
  }
  // 如果 localStorage 没有数据，使用 CLAUDE.md 中的 deadline
}

function syncDeadlineToFeishu() {
  var data = loadDeadlineData();
  if (!data.date || !data.task) {
    document.getElementById('dlSyncStatus').textContent = '请填写日期和节点名称';
    return;
  }
  document.getElementById('dlSyncStatus').textContent = '同步中...';
  document.getElementById('dlSyncBtn').disabled = true;

  var caseName = '';
  if (window._D && window._D.caseName) caseName = window._D.caseName;
  else if (window.CONFIRM_TABLE_DATA && window.CONFIRM_TABLE_DATA.caseName) caseName = window.CONFIRM_TABLE_DATA.caseName;

  var payload = {
    action: 'sync_task',
    payload: { fields: {
      '任务名称': data.task,
      '截止日期': data.date,
      '备注': data.note || '',
      '来源案件': caseName
    }}
  };

  fetch('http://127.0.0.1:18903/sync-feishu', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(r){ return r.json(); })
  .then(function(res){
    document.getElementById('dlSyncStatus').textContent = res.ok ? '已同步到飞书 ✓' : '同步失败: ' + (res.error || '未知错误');
    document.getElementById('dlSyncBtn').disabled = false;
  }).catch(function(){
    // 代理未启动，降级：复制到剪贴板供手动运行
    var cmd = 'node ~/.local/bin/sync-feishu-deadline.js --task "' + data.task + '" --date "' + data.date + '"';
    if (data.note) cmd += ' --note "' + data.note + '"';
    if (caseName) cmd += ' --case "' + caseName + '"';
    var text = cmd;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function(){
        document.getElementById('dlSyncStatus').textContent = '代理未启动，已复制命令到剪贴板。终端粘贴运行即可同步';
      });
    } else {
      document.getElementById('dlSyncStatus').textContent = '代理未启动。请在终端运行: ' + cmd;
    }
    document.getElementById('dlSyncBtn').disabled = false;
  });
}

// 页面加载时，优先用 localStorage 的 deadline 覆盖 CLAUDE.md 中的值
function applyLocalDeadline() {
  var local = loadDeadlineData();
  if (local.date) {
    // 等 _D 加载后用 local deadline 覆盖
    var check = setInterval(function(){
      if (window._D) {
        clearInterval(check);
        updateDeadlineDisplay();
      }
    }, 100);
    // 15秒超时
    setTimeout(function(){ clearInterval(check); }, 15000);
  }
}
applyLocalDeadline();

// 主题切换功能
function initTheme() {
  var saved = localStorage.getItem('caseDashboardTheme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeBtn(saved);
}

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('caseDashboardTheme', next);
  updateThemeBtn(next);
}

function updateThemeBtn(theme) {
  var btn = document.getElementById('themeToggleBtn');
  if (btn) {
    btn.textContent = theme === 'dark' ? '🌙' : '☀️';
    btn.title = theme === 'dark' ? '切换到浅色主题' : '切换到深色主题';
  }
}

initTheme();
</script>
